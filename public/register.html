<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Assessment Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1><i class="fas fa-user-plus" style="color:var(--primary)"></i> Register</h1>
      <p>Create an account to start assessing students.</p>
      <div class="alert" id="alert"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Your name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      alert.className = 'alert';
      alert.textContent = '';
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = 'dashboard.html';
        } else {
          alert.className = 'alert error';
          alert.textContent = data.error || 'Registration failed';
        }
      } catch (err) {
        alert.className = 'alert error';
        alert.textContent = 'Connection error. Is the server running?';
      }
    });
  </script>
</body>
</html>
