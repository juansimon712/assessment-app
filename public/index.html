<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .landing { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:40px 20px; }
    .landing h1 { font-size:2rem; margin-bottom:8px; }
    .landing p { color:var(--text-secondary); margin-bottom:32px; max-width:500px; }
    .landing-cards { display:flex; gap:24px; flex-wrap:wrap; justify-content:center; }
    .landing-card { display:flex; flex-direction:column; align-items:center; justify-content:center; width:260px; padding:40px 24px; background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); text-decoration:none; color:var(--text); transition:transform 0.15s, box-shadow 0.15s; border:2px solid transparent; }
    .landing-card:hover { transform:translateY(-4px); box-shadow:0 12px 24px rgba(0,0,0,0.12); border-color:var(--primary); }
    .landing-card i { font-size:2.5rem; color:var(--primary); margin-bottom:12px; }
    .landing-card h2 { font-size:1.2rem; margin-bottom:4px; }
    .landing-card p { font-size:0.85rem; margin:0; }
  </style>
</head>
<body>
  <div class="landing">
    <h1><i class="fas fa-clipboard-list" style="color:var(--primary)"></i> Student Assessment Portal</h1>
    <p>Demo class evaluation and student management system. Choose your entry point below.</p>
    <div class="landing-cards">
      <a href="tutor-view.html" class="landing-card">
        <i class="fas fa-chalkboard-teacher"></i>
        <h2>Tutor Demo Update</h2>
        <p>View your assigned demos, assess students, and submit evaluation forms.</p>
      </a>
      <a href="login.html" class="landing-card">
        <i class="fas fa-sign-in-alt"></i>
        <h2>Admin Login</h2>
        <p>Manage submissions, tutors, and view analytics dashboard.</p>
      </a>
    </div>
  </div>
</body>
</html>
