<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .analytics-page *,
    .analytics-page *::before,
    .analytics-page *::after { margin: 0; padding: 0; box-sizing: border-box; }

    .analytics-page {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background var(--transition), color var(--transition);
    }

    .analytics-page .layout { display: flex; min-height: 100vh; }

    .analytics-page .sidebar {
      width: 240px;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
      transition: transform var(--transition);
    }

    .analytics-page .sidebar-header {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 24px;
      font-size: 1.3rem; font-weight: 700; color: var(--text);
      border-bottom: 1px solid var(--border);
    }

    .analytics-page .sidebar-header i { color: var(--primary); font-size: 1.5rem; }

    .analytics-page .sidebar-nav {
      display: flex; flex-direction: column;
      padding: 16px 12px; gap: 4px; flex: 1;
    }

    .analytics-page .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px; border-radius: 50px;
      color: var(--sidebar-text); text-decoration: none;
      font-size: 0.9rem; transition: all var(--transition);
    }

    .analytics-page .nav-item i { width: 20px; text-align: center; font-size: 1.1rem; }
    .analytics-page .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--sidebar-active); }
    .analytics-page .nav-item.active { background: var(--primary); color: #fff; }

    .analytics-page .main {
      flex: 1; margin-left: 240px;
      display: flex; flex-direction: column;
    }

    .analytics-page .header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 28px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 50;
      transition: background var(--transition);
    }

    .analytics-page .hamburger {
      display: none; background: none; border: none;
      font-size: 1.3rem; color: var(--text); cursor: pointer; padding: 4px;
    }

    .analytics-page .header-actions {
      display: flex; align-items: center; gap: 8px; margin-left: auto;
    }

    .analytics-page .icon-btn {
      background: none; border: none; width: 40px; height: 40px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 1.1rem; cursor: pointer;
      transition: all var(--transition);
    }

    .analytics-page .icon-btn:hover { background: var(--bg); color: var(--text); }

    .analytics-page .content {
      padding: 28px;
      display: flex; flex-direction: column; gap: 24px;
    }

    .analytics-page .page-header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
    .analytics-page .page-header p { color: var(--text-secondary); font-size: 0.9rem; }

    .analytics-page .no-data {
      text-align: center; padding: 40px 20px;
      color: var(--text-secondary); font-size: 0.9rem;
    }

    .analytics-page .no-data i { font-size: 2rem; margin-bottom: 12px; opacity: 0.5; }

    .analytics-page .full-width { grid-column: 1 / -1; }

    .analytics-page .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
    }
    .analytics-page .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .analytics-page .card-header h3 { font-size: 1.05rem; font-weight: 700; }

    .analytics-page .table-responsive { overflow-x: auto; }

    .analytics-page table {
      width: 100%; border-collapse: collapse; font-size: 0.85rem;
    }

    .analytics-page thead th {
      text-align: left; padding: 10px 14px; font-weight: 600;
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-secondary); border-bottom: 2px solid var(--border);
      white-space: nowrap;
    }

    .analytics-page tbody td {
      padding: 10px 14px; border-bottom: 1px solid var(--border);
    }

    .analytics-page tbody tr:hover { background: var(--surface-hover); }

    @media (max-width: 1024px) {
      .analytics-page .chart-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .analytics-page .sidebar { transform: translateX(-100%); }
      .analytics-page .sidebar.open { transform: translateX(0); }
      .analytics-page .main { margin-left: 0; }
      .analytics-page .hamburger { display: block; }
      .analytics-page .content { padding: 16px; }
      .analytics-page .header { padding: 12px 16px; }
    }
  </style>
</head>
<body>
  <div class="analytics-page">
    <div class="layout">
      <aside class="sidebar" id="analyticsSidebar">
        <div class="sidebar-header">
          <i class="fas fa-chart-line"></i> AssessPro
        </div>
      <nav class="sidebar-nav">
        <a href="analytics.html" class="nav-item active"><i class="fas fa-chart-pie"></i> Analytics</a>
        <a href="dashboard.html" class="nav-item"><i class="fas fa-list"></i> Submissions</a>
        <a href="tutor-view.html" class="nav-item"><i class="fas fa-user-graduate"></i> Tutor Demo Assessment</a>
        <a href="admin-tutors.html" class="nav-item"><i class="fas fa-users-cog"></i> Manage Tutors</a>
        <a href="completed.html" class="nav-item"><i class="fas fa-check-circle"></i> Demo Completed</a>
        <a href="conversion.html" class="nav-item"><i class="fas fa-percent"></i> Conversion Rate</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="analyticsLogout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
      </aside>

      <main class="main">
          <header class="header">
            <button class="hamburger" id="analyticsHamburger"><i class="fas fa-bars"></i></button>
            <span style="font-weight:600;font-size:1.05rem">Analytics</span>
            <div class="header-actions"></div>
          </header>

        <section class="content">
          <div class="page-header">
            <h1>Tutor Conversion Rankings</h1>
            <p>Ranked by conversion rate (Converted ÷ Total Demos × 100).</p>
          </div>

          <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:4px">
            <label style="font-size:0.85rem;color:var(--text-secondary)">From:</label>
            <input type="date" id="dateFrom" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:0.85rem">
            <label style="font-size:0.85rem;color:var(--text-secondary)">To:</label>
            <input type="date" id="dateTo" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:0.85rem">
          </div>

          <div class="card full-width">
            <div class="card-header">
              <h3>Conversion Ranking</h3>
              <span id="lastUpdated" style="font-size:0.8rem;color:var(--text-secondary)"></span>
            </div>
            <div class="card-body table-responsive" id="tutorRankingWrap"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      (async () => {
        try {
          const r = await fetch('/api/me');
          const d = await r.json();
          if (!d.authenticated) { window.location.href = 'login.html'; return; }
        } catch { window.location.href = 'login.html'; }
      })();

      document.getElementById('analyticsLogout')?.addEventListener('click', async (e) => {
        e.preventDefault();
        await fetch('/api/logout', { method: 'POST' });
        window.location.href = 'index.html';
      });

      const hamburger = document.getElementById('analyticsHamburger');
      const sidebar = document.getElementById('analyticsSidebar');
      hamburger.addEventListener('click', () => sidebar.classList.toggle('open'));
      document.addEventListener('click', (e) => {
        if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !hamburger.contains(e.target))
          sidebar.classList.remove('open');
      });

      function normalizeDate(val) {
        if (!val) return '';
        const m = val.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{2,4})$/);
        if (!m) return val;
        let dd = m[1].padStart(2, '0');
        let mm = m[2].padStart(2, '0');
        let yy = m[3];
        if (yy.length === 2) yy = '20' + yy;
        return yy + '-' + mm + '-' + dd;
      }

      function inDateRange(dateStr, from, to) {
        const d = normalizeDate(dateStr);
        if (!d) return true;
        return (!from || d >= from) && (!to || d <= to);
      }

      async function loadRanking() {
        const wrap = document.getElementById('tutorRankingWrap');
        const updated = document.getElementById('lastUpdated');
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;
        try {
          const [sheetRes, tutorsRes] = await Promise.all([
            fetch('/api/sheet-data').then(r => r.json()),
            fetch('/api/admin/tutors').then(r => r.json()),
          ]);
          const allEntries = sheetRes.entries || [];
          updated.textContent = new Date().toLocaleString();

          const entries = dateFrom || dateTo
            ? allEntries.filter(e => inDateRange(e.date, dateFrom, dateTo))
            : allEntries;

          function calcIncentive(total, pct, converted) {
            let rate = 0;
            if (total >= 35 && pct >= 45) rate = 400;
            else if (total >= 30 && pct >= 40) rate = 350;
            else if (total >= 25 && pct >= 35) rate = 300;
            return rate * converted;
          }

          const ranking = tutorsRes.map(t => {
            const tutorEntries = entries.filter(e => {
              const sn = (e.tutor_name || '').toLowerCase();
              const tn = t.name.toLowerCase();
              return sn === tn;
            });
            const converted = tutorEntries.filter(e => e.status === 'Converted' || e.demo_status === 'Converted').length;
            const demoDone = tutorEntries.filter(e => e.demo_status === 'Demo Done' || e.demo_status === 'Assessment Pending').length;
            const total = demoDone + converted;
            const pct = total > 0 ? Math.round((converted / total) * 100) : 0;
            const incentive = calcIncentive(total, pct, converted);
            return { name: t.name, code: t.code, total, converted, pct, incentive };
          }).filter(r => r.total > 0).sort((a, b) => b.pct - a.pct || b.total - a.total);

          if (!ranking.length) {
            wrap.innerHTML = '<div class="no-data"><i class="fas fa-trophy"></i><p>No data yet. Complete some demos first.</p></div>';
            return;
          }

          const maxPct = ranking[0].pct || 1;
          wrap.innerHTML = `
            <table>
              <thead><tr><th>Rank</th><th>Tutor</th><th>Code</th><th>Demos Done</th><th>Conversion %</th><th>Incentive</th></tr></thead>
              <tbody>${ranking.map((r, i) => `
                <tr>
                  <td style="font-weight:700;font-size:1.1rem;text-align:center">${i < 3 ? ['🥇','🥈','🥉'][i] : '#' + (i+1)}</td>
                  <td style="font-weight:600">${r.name}</td>
                  <td style="font-family:monospace;font-weight:700;color:var(--primary)">${r.code || '-'}</td>
                  <td style="text-align:center">${r.total}</td>
                  <td>
                    <div style="display:flex;align-items:center;gap:8px">
                      <span style="font-weight:700;font-size:0.9rem;min-width:44px">${r.pct}%</span>
                      <div style="flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden">
                        <div style="height:100%;width:${(r.pct/maxPct)*100}%;background:${r.pct >= 50 ? '#10b981' : r.pct >= 25 ? '#f59e0b' : '#ef4444'};border-radius:4px;transition:width 0.6s ease"></div>
                      </div>
                    </div>
                  </td>
                  <td style="font-weight:700;text-align:center;color:${r.incentive > 0 ? '#10b981' : 'var(--text-secondary)'}">₹${r.incentive.toLocaleString('en-IN')}</td>
                </tr>
              `).join('')}</tbody>
            </table>`;
        } catch (e) {
          wrap.innerHTML = '<div class="no-data"><i class="fas fa-database"></i><p>Error loading data.</p></div>';
        }
      }

      document.getElementById('dateFrom').addEventListener('change', loadRanking);
      document.getElementById('dateTo').addEventListener('change', loadRanking);

      loadRanking();
    });
  </script>
</body>
</html>
