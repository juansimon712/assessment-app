<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <i class="fas fa-clipboard-list"></i> AssessPro
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="active"><i class="fas fa-list"></i> Submissions</a>
        <a href="tutor-view.html"><i class="fas fa-user-graduate"></i> Tutor Demo Assessment</a>
        <a href="admin-tutors.html"><i class="fas fa-users-cog"></i> Manage Tutors</a>
        <a href="analytics.html"><i class="fas fa-chart-pie"></i> Analytics</a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" id="logoutLink"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        <span class="topbar-title">Dashboard</span>
        <div class="topbar-right">
          <span class="topbar-user" id="userName"></span>
        </div>
      </header>

      <div class="content-area">
        <div class="page-header">
          <h1>Demo Tracking</h1>
          <p>Auto-refreshes every 30s. <span id="sheetSyncInfo"></span></p>
        </div>
        <div style="margin-bottom:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label style="font-size:0.85rem;color:var(--text-secondary)">Filter by Tutor:</label>
          <select id="tutorFilter" style="padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text)">
            <option value="">All Tutors</option>
          </select>
          <label style="font-size:0.85rem;color:var(--text-secondary);margin-left:8px">Date:</label>
          <input type="date" id="dateFilter" style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:0.85rem">
          <label style="font-size:0.85rem;color:var(--text-secondary);margin-left:8px">Slot:</label>
          <input type="text" id="slotFilter" placeholder="Search slot..." style="padding:6px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:0.85rem;width:140px">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Slot</th>
                <th>Student Name</th>
                <th>Age</th>
                <th>Language</th>
                <th>Demo Status</th>
                <th>Status</th>
                <th>Tutor</th>
                <th>Agent</th>
                <th>Phone</th>
              </tr>
            </thead>
            <tbody id="sheetTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      <h2 id="modalTitle">Assessment Details</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    // Check auth
    (async () => {
      try {
        const res = await fetch('/api/me');
        const data = await res.json();
        if (!data.authenticated) {
          window.location.href = 'login.html';
          return;
        }
        document.getElementById('userName').textContent = data.name;
      } catch {
        window.location.href = 'login.html';
      }
    })();

    async function loadTutors() {
      try {
        const res = await fetch('/api/sheet-tutors');
        const tutors = await res.json();
        const sel = document.getElementById('tutorFilter');
        sel.innerHTML = '<option value="">All Tutors</option>' + tutors.map(t => `<option value="${t}">${t}</option>`).join('');
      } catch (e) {}
    }
    loadTutors();

    document.getElementById('tutorFilter').addEventListener('change', loadSheetData);
    document.getElementById('dateFilter').addEventListener('change', renderFilteredSheet);
    document.getElementById('slotFilter').addEventListener('input', renderFilteredSheet);

    document.getElementById('sheetTableBody').addEventListener('click', async (e) => {
      const tr = e.target.closest('tr[data-row]');
      if (!tr || e.target.tagName === 'SELECT') return;
      const row = tr.dataset.row;
      try {
        const res = await fetch('/api/assessments/by-row/' + row);
        const a = await res.json();
        if (!a) {
          const cells = tr.cells;
          document.getElementById('modalTitle').textContent = (cells[3]?.textContent || 'Demo') + ' — ' + (cells[2]?.textContent || '');
          document.getElementById('modalBody').innerHTML = `
            <div class="modal-field"><label>Date</label><div class="value">${cells[0]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Time</label><div class="value">${cells[1]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Slot</label><div class="value">${cells[2]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Student Name</label><div class="value">${cells[3]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Age</label><div class="value">${cells[4]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Language</label><div class="value">${cells[5]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Demo Status</label><div class="value">${cells[6]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Tutor</label><div class="value">${cells[8]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Agent</label><div class="value">${cells[9]?.textContent || '—'}</div></div>
            <div class="modal-field"><label>Phone</label><div class="value">${cells[10]?.textContent || '—'}</div></div>
            <hr style="margin:12px 0;border-color:var(--border)">
            <p style="text-align:center;color:var(--text-secondary);font-size:0.85rem">No detailed assessment has been submitted for this demo yet.<br>Tutor needs to assess from the <a href="tutor-view.html" style="color:var(--primary)">Tutor Demo Assessment</a> page.</p>`;
        } else {
          document.getElementById('modalTitle').textContent = a.student_name + ' — ' + a.slot;
          document.getElementById('modalBody').innerHTML = `
            <div class="modal-field"><label>Tutor</label><div class="value">${a.tutor_name || '—'}</div></div>
            <div class="modal-field"><label>Phone</label><div class="value">${a.phone || '—'}</div></div>
            <div class="modal-field"><label>Demo Date</label><div class="value">${a.date || '—'}</div></div>
            <div class="modal-field"><label>Demo Time</label><div class="value">${a.time || '—'}</div></div>
            <div class="modal-field"><label>Student Age</label><div class="value">${a.student_age}</div></div>
            <div class="modal-field"><label>Language</label><div class="value">${a.language}</div></div>
            <div class="modal-field"><label>Level</label><div class="value"><span class="status-badge ${a.level}">${a.level}</span></div></div>
            ${a.topics_known.length ? `<div class="modal-field"><label>Topics Known</label><div class="topic-chips">${a.topics_known.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
            ${a.topics_covered.length ? `<div class="modal-field"><label>Topics Covered During Demo</label><div class="topic-chips">${a.topics_covered.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
            ${a.start_topic ? `<div class="modal-field"><label>Recommended Start Topic</label><div class="value">${a.start_topic}</div></div>` : ''}
            ${a.revision_topics.length ? `<div class="modal-field"><label>Topics Needing Revision</label><div class="topic-chips">${a.revision_topics.map(t => `<span class="topic-chip">${t}</span>`).join('')}</div></div>` : ''}
            <div class="modal-field"><label>Feedback</label><div class="value">${a.feedback}</div></div>
            <div class="modal-field"><label>Interest Level</label><div class="value">${'★'.repeat(a.interest_level)}${'☆'.repeat(5-a.interest_level)} (${a.interest_level}/5)</div></div>
            ${a.additional_remarks ? `<div class="modal-field"><label>Additional Remarks</label><div class="value">${a.additional_remarks}</div></div>` : ''}
            <div class="modal-field"><label>Submitted</label><div class="value">${new Date(a.created_at + 'Z').toLocaleString()}</div></div>`;
        }
        document.getElementById('modal').classList.add('open');
      } catch (err) {
        console.error(err);
      }
    });

    document.getElementById('modalClose').addEventListener('click', () => {
      document.getElementById('modal').classList.remove('open');
    });
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) document.getElementById('modal').classList.remove('open');
    });

    document.getElementById('sheetTableBody').addEventListener('change', async (e) => {
      if (!e.target.classList.contains('sheet-status-select')) return;
      const row = e.target.dataset.row;
      const status = e.target.value;
      try {
        await fetch('/api/sheet-data/' + row + '/status', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
      } catch (err) {
        console.error(err);
      }
    });

    // Hamburger
    document.getElementById('hamburger').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
    });

    // Logout
    document.getElementById('logoutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = 'index.html';
    });

    let cachedSheetData = { entries: [], lastSync: null };

    function normalizeDate(val) {
      if (!val) return '';
      const m = val.match(/^(\d{1,2})[\/.](\d{1,2})[\/.](\d{2,4})$/);
      if (!m) return val;
      let dd = m[1].padStart(2, '0');
      let mm = m[2].padStart(2, '0');
      let yy = m[3];
      if (yy.length === 2) yy = '20' + yy;
      return yy + '-' + mm + '-' + dd;
    }

    function renderFilteredSheet() {
      const dateVal = document.getElementById('dateFilter').value;
      const slotVal = document.getElementById('slotFilter').value.toLowerCase().trim();
      const entries = cachedSheetData.entries.filter(e => {
        if (dateVal && normalizeDate(e.date) !== dateVal) return false;
        if (slotVal && !(e.slot || '').toLowerCase().includes(slotVal)) return false;
        return true;
      });
      const tbody = document.getElementById('sheetTableBody');
      if (!entries.length) {
        tbody.innerHTML = '<tr><td colspan="11" style="text-align:center;padding:20px;color:var(--text-secondary)">No sheet data found</td></tr>';
        return;
      }
      const statuses = ['New', 'Contacted', 'Demo Done', 'Demo Rescheduled', 'Demo Cancelled', 'Demo Not Done', 'Converted', 'Not Interested'];
      tbody.innerHTML = entries.map(e => `
        <tr data-row="${e.row}" style="cursor:pointer">
          <td>${e.date || '-'}</td>
          <td>${e.time || '-'}</td>
          <td>${e.slot || '-'}</td>
          <td><strong>${e.student_name || '-'}</strong></td>
          <td>${e.age || '-'}</td>
          <td>${e.language || '-'}</td>
          <td><span class="status-badge ${(() => { const s = e.demo_status.toLowerCase(); if (s.includes('not done')) return 'DemoNotDone'; if (s.includes('done')) return 'DemoDone'; if (s === 'converted') return 'Converted'; return 'New'; })()}">${e.demo_status}</span></td>
          <td><select class="sheet-status-select" data-row="${e.row}" style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.8rem;background:var(--surface);color:var(--text)" onclick="event.stopPropagation()">${statuses.map(s => `<option value="${s}" ${s === e.status ? 'selected' : ''}>${s}</option>`).join('')}</select></td>
          <td>${e.tutor_name || '-'}</td>
          <td>${e.agent_name || '-'}</td>
          <td>${e.phone || '-'}</td>
        </tr>
      `).join('');
    }

    async function loadSheetData() {
      try {
        const filter = document.getElementById('tutorFilter').value;
        const url = filter ? '/api/sheet-data?tutor=' + encodeURIComponent(filter) : '/api/sheet-data';
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById('sheetSyncInfo').textContent = data.lastSync ? 'Last sync: ' + new Date(data.lastSync + 'Z').toLocaleTimeString() : '';
        cachedSheetData = { entries: data.entries || [], lastSync: data.lastSync };
        renderFilteredSheet();
      } catch (err) {
        console.error('Failed to load sheet data', err);
      }
    }

    loadSheetData();
    setInterval(loadSheetData, 30000);
  </script>
</body>
</html>
